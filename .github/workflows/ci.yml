name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    timeout-minutes: 10
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Bootstrap
        run: ./scripts/bootstrap

      - name: Lint
        run: ./scripts/lint

      - name: Build
        run: ./scripts/build

      - name: Test
        run: ./scripts/test
